<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Godwin Inalegwu Ayuba | Frontend Developer</title>
  <meta name="description" content="Frontend Developer crafting high-performance, clean, and user-friendly web experiences with React.">
  <meta name="theme-color" content="#0a0a0c" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0c;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.15);
    }

    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ambient Background Glows */
    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: 
        radial-gradient(circle at 10% 10%, var(--accent-glow) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
      filter: blur(80px);
      animation: ambient-drift 15s infinite alternate ease-in-out;
    }

    @keyframes ambient-drift {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(2%, 2%); }
    }

    /* Fancy Loading State */
    #root:empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .loader-text {
      font-weight: 900;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      letter-spacing: -0.05em;
      background: linear-gradient(to right, #fff 20%, var(--accent) 50%, #fff 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 2s linear infinite;
    }

    .loader-bar-container {
      width: 150px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .loader-bar-fill {
      position: absolute;
      height: 100%;
      width: 40%;
      background: var(--accent);
      box-shadow: 0 0 15px var(--accent);
      animation: loading-slide 1.5s infinite ease-in-out;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    @keyframes loading-slide {
      0% { left: -40%; }
      100% { left: 110%; }
    }

    /* Grain Texture Overlay */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <div id="root">
    <div class="loader-content">
      <div class="loader-text">GODWIN</div>
      <div class="loader-bar-container">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
