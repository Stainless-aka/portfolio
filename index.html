<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Godwin Inalegwu Ayuba | Full-Stack Developer & Artist</title>
  <meta name="description" content="Full-Stack Developer crafting high-performance web experiences with Next.js, TypeScript, and AI integration.">
  <meta name="theme-color" content="#0a0a0c" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020408;
      --accent: #ffb86c;
      --accent-glow: rgba(255, 184, 108, 0.16);
    }

    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        radial-gradient(circle at 20% 20%, rgba(255,184,108,0.08), transparent 16%);
      background-size: 24px 24px, 24px 24px, 450px 450px;
      background-blend-mode: screen;
      color: #e9e0c7;
      font-family: 'Fira Code', 'JetBrains Mono', Consolas, monospace;
      overflow-x: hidden;
      height: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ambient Background Glows */
    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: 
        radial-gradient(circle at 15% 15%, var(--accent-glow) 0%, transparent 38%),
        radial-gradient(circle at 85% 85%, rgba(255, 184, 108, 0.08) 0%, transparent 36%);
      filter: blur(60px);
      animation: ambient-drift 15s infinite alternate ease-in-out;
    }

    @keyframes ambient-drift {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(2%, 2%); }
    }

    /* Fancy Loading State - Shows until React Mounts */
    #root {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 2rem 2.5rem;
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 1rem;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      box-shadow: 0 26px 70px rgba(0,0,0,0.25);
    }

    .loader-text {
      font-weight: 900;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: 'Fira Code', 'JetBrains Mono', monospace;
      color: var(--accent);
      text-shadow:
        0 0 8px rgba(255,184,108,0.32),
        0 0 16px rgba(255,184,108,0.16);
    }

    .loader-bar-container {
      width: 150px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.06);
    }

    .loader-bar-fill {
      position: absolute;
      height: 100%;
      width: 40%;
      background: var(--accent);
      box-shadow: 0 0 15px rgba(255,184,108,0.6);
      animation: loading-slide 1.5s infinite ease-in-out;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    @keyframes loading-slide {
      0% { left: -40%; }
      100% { left: 110%; }
    }

    /* Grain Texture Overlay */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <div id="root">
    <div class="loader-content">
      <div class="loader-text">Godwin Inalegwu Ayuba</div>
      <div class="loader-bar-container">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
